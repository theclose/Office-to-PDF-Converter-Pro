name: Office Converter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel previous runs when new commit pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # JOB 1: Lint & Syntax Check (Fast - ~30s)
  # ==========================================================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Ruff
        run: pip install ruff
      
      - name: Syntax Check
        run: |
          python -m py_compile main.py
          python -m py_compile run_pro.py
          find converters/ -name "*.py" -exec python -m py_compile {} \;
          find ui/ -name "*.py" -exec python -m py_compile {} \;
          find utils/ -name "*.py" -exec python -m py_compile {} \;
      
      - name: Ruff Linting
        run: ruff check . --select=E,F,W --output-format=github

  # ==========================================================================
  # JOB 2: Unit Tests (Main - ~2min)
  # ==========================================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Tests
        run: |
          pytest tests/ -v \
            --cov=converters --cov=utils --cov=core \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml
      
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ==========================================================================
  # JOB 3: Build Check (Verify imports work)
  # ==========================================================================
  build:
    name: 🔨 Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Import Check
        run: |
          python -c "from converters import WordConverter, ExcelConverter, PPTConverter"
          python -c "from utils import file_utils, config"
          echo "✓ All imports successful"

  # ==========================================================================
  # JOB 4: Summary
  # ==========================================================================
  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 Office Converter CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
