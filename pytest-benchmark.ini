# Performance Benchmark Configuration
# ====================================
# pytest-benchmark settings for Office Converter

[tool.pytest.benchmark]
# Minimum rounds
min_rounds = 5

# Minimum time per round
min_time = 0.000005

# Maximum time (prevent hanging)
max_time = 1.0

# Warmup rounds before measurement
warmup = true
warmup_iterations = 2

# Disable GC during measurement for consistency
disable_gc = true

# Statistics to compute
statistics = ["min", "max", "mean", "stddev", "median"]

# Histogram
histogram = true

# Autosave results
autosave = true

# Save data for comparison
save-data = true

# Storage location
storage = "file://.benchmarks"

# Output format
verbose = true
columns = ["min", "max", "mean", "stddev", "median", "ops", "rounds"]

# Grouping
group-by = "group"

# Comparison
compare = "0001"
compare-fail = ["min:10%", "mean:10%"]  # Fail if 10% slower

# Calibration
calibration-precision = 10
calibration-curves = ["linear", "cubic"]
